name: astraplay
description: "AstraPlay - Advanced Media Player for M3U and Xtream Streams"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.0.0
  get_it: ^9.2.1
  equatable: ^2.0.7
  
  # Database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Network
  dio: ^5.7.0
  connectivity_plus: ^7.1.1

  # UI & UX
  cached_network_image: ^3.4.1
  go_router: ^17.3.0
  flex_color_scheme: ^8.1.0
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  
  # Utils
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  dartz: ^0.10.1
  intl: ^0.20.2
  shared_preferences: ^2.5.2
  glassmorphism: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.9
  build_config: ^1.1.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F172A"
  image: "assets/icon/app_icon.png"
  android_12:
    image: "assets/icon/app_icon.png"
    color: "#0F172A"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
